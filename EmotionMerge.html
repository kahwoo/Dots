<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Emotions: Intensity Update</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --text-color: #f8fafc;
            --border-color: #334155;
            --hover-color: #475569;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; overflow: hidden; touch-action: none;
        }

        #game-container { flex: 1; position: relative; }
        canvas { display: block; width: 100%; height: 100%; user-select: none; }

        #sidebar {
            width: 320px; background-color: var(--sidebar-bg);
            border-left: 2px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 10;
        }

        #sidebar-header {
            padding: 20px; font-size: 20px; font-weight: bold; text-align: center;
            border-bottom: 2px solid var(--border-color);
        }

        #sidebar-header span { display: block; font-size: 11px; color: #94a3b8; margin-top: 5px; }

        #emotion-list {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
        }

        .emotion-btn {
            background-color: var(--border-color); padding: 6px 10px;
            border-radius: 15px; cursor: pointer; font-size: 13px;
            transition: all 0.2s; border: 1px solid transparent;
        }

        .emotion-btn:hover { background-color: var(--hover-color); transform: scale(1.05); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 35%; border-left: none; border-top: 2px solid var(--border-color); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="sidebar">
        <div id="sidebar-header">
            Emotion Library
            <span id="counter">Discovered: 0</span>
        </div>
        <div id="emotion-list"></div>
    </div>

    <script>
        // --- EXPANDED SEED DATA ---
        // Vectors: [Valence, Arousal, Dominance, Social, Time]
        const seedEmotions = [
            { name: "Joy", vector: [0.8, 0.4, 0.5, 0.2, 0.0] },
            { name: "Sorrow", vector: [-0.8, -0.4, -0.6, -0.2, -0.4] },
            { name: "Anger", vector: [-0.7, 0.8, 0.7, -0.3, 0.0] },
            { name: "Fear", vector: [-0.8, 0.8, -0.8, -0.1, 0.5] },
            { name: "Trust", vector: [0.6, -0.2, 0.2, 0.8, 0.1] },
            { name: "Disgust", vector: [-0.6, 0.4, 0.2, -0.6, 0.0] },
            { name: "Surprise", vector: [0.2, 0.9, -0.2, 0.0, 0.0] },
            { name: "Anticipation", vector: [0.4, 0.6, 0.3, 0.0, 0.8] },
            { name: "Calm", vector: [0.5, -0.8, 0.4, -0.2, -0.1] },
            { name: "Boredom", vector: [-0.3, -0.7, -0.3, -0.5, 0.2] },
            { name: "Envy", vector: [-0.5, 0.3, -0.4, 0.6, 0.0] },
            { name: "Pride", vector: [0.7, 0.5, 0.9, 0.3, -0.2] },
            { name: "Shame", vector: [-0.7, 0.2, -0.9, 0.5, -0.3] },
            { name: "Lust", vector: [0.4, 0.9, 0.3, 0.7, 0.1] },
            { name: "Awe", vector: [0.8, 0.7, -0.5, 0.0, 0.0] },
            { name: "Contempt", vector: [-0.4, 0.2, 0.8, 0.4, 0.0] },
            { name: "Grief", vector: [-0.9, -0.2, -0.8, 0.1, -0.9] },
            { name: "Hope", vector: [0.6, 0.3, 0.2, 0.1, 0.9] },
            { name: "Guilt", vector: [-0.6, 0.4, -0.7, 0.4, -0.5] },
            { name: "Ecstasy", vector: [1.0, 1.0, 0.6, 0.3, 0.0] }
        ];

        let knownEmotions = [...seedEmotions];
        let discoveredNames = new Set(seedEmotions.map(e => e.name));
        let nodes = [];
        let particles = [];
        let draggingNode = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const emotionList = document.getElementById('emotion-list');

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- CORE LOGIC ---
        function getVectorColor(v) {
            const hue = 240 - ((v[0] + 1) / 2) * 180;
            const sat = 40 + ((v[1] + 1) / 2) * 60;
            const lit = 30 + ((v[2] + 1) / 2) * 40;
            return `hsl(${hue}, ${sat}%, ${lit}%)`;
        }

        function getEmotionData(v1, v2, name1, name2) {
            let mergedVector = v1.map((val, i) => (val + v2[i]) / 2);
            
            // INTENSITY LOGIC: If merging same emotions, boost Arousal and Dominance
            if (name1 === name2) {
                mergedVector[1] = Math.min(1.0, mergedVector[1] + 0.3); // Boost Arousal
                mergedVector[2] = Math.min(1.0, mergedVector[2] + 0.2); // Boost Dominance
            }

            // Check proximity to existing
            let bestMatch = null;
            let minDistance = Infinity;
            knownEmotions.forEach(e => {
                let d = Math.sqrt(e.vector.reduce((sum, val, i) => sum + Math.pow(val - mergedVector[i], 2), 0));
                if (d < minDistance) { minDistance = d; bestMatch = e.name; }
            });

            if (minDistance < 0.25 && bestMatch !== name1) return { name: bestMatch, vector: mergedVector };

            // Procedural Name Generation
            const [val, aro, dom, soc, time] = mergedVector;
            let prefixes = [];
            
            if (name1 === name2) prefixes.push("Intense");
            else {
                if (aro > 0.7) prefixes.push("Violent");
                if (aro < -0.6) prefixes.push("Faint");
                if (dom > 0.7) prefixes.push("Pure");
                if (dom < -0.7) prefixes.push("Submissive");
            }

            let base = val > 0 ? "Joy" : (val < 0 ? "Sorrow" : "Existentialism");
            if (Math.abs(val) < 0.2) base = "Neutrality";

            const newName = [...new Set([...prefixes, base])].join(" ");
            
            if (!knownEmotions.some(e => e.name === newName)) {
                knownEmotions.push({ name: newName, vector: mergedVector });
            }
            return { name: newName, vector: mergedVector };
        }

        // --- CLASSES ---
        class Node {
            constructor(x, y, name, vector) {
                this.x = x; this.y = y; this.name = name; this.vector = vector;
                this.vx = (Math.random()-0.5)*2; this.vy = (Math.random()-0.5)*2;
                this.radius = 0; this.targetRadius = 35 + (vector[1] * 20);
                this.color = getVectorColor(vector);
            }
            update() {
                if (this.radius < this.targetRadius) this.radius += 2;
                if (this === draggingNode) return;
                this.vx += (canvas.width/2 - this.x) * 0.00002;
                this.vy += (canvas.height/2 - this.y) * 0.00002;
                this.x += this.vx *= 0.99; this.y += this.vy *= 0.99;
                if (this.x<this.radius || this.x>canvas.width-this.radius) this.vx *= -1;
                if (this.y<this.radius || this.y>canvas.height-this.radius) this.vy *= -1;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0; ctx.fillStyle = "white"; ctx.textAlign = "center";
                ctx.font = "bold 12px sans-serif";
                ctx.fillText(this.name, this.x, this.y + 5);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random()-0.5)*10; this.vy = (Math.random()-0.5)*10;
                this.life = 1.0;
            }
            draw() {
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
                this.x += this.vx; this.y += this.vy; this.life -= 0.02;
            }
        }

        // --- INTERACTION ---
        function handlePointerDown(e) {
            const rect = canvas.getBoundingClientRect();
            const px = (e.clientX || e.touches[0].clientX) - rect.left;
            const py = (e.clientY || e.touches[0].clientY) - rect.top;
            for (let i = nodes.length - 1; i >= 0; i--) {
                if (Math.hypot(px - nodes[i].x, py - nodes[i].y) < nodes[i].radius) {
                    draggingNode = nodes[i];
                    dragOffsetX = px - draggingNode.x; dragOffsetY = py - draggingNode.y;
                    return;
                }
            }
        }

        function handlePointerMove(e) {
            if (!draggingNode) return;
            const rect = canvas.getBoundingClientRect();
            draggingNode.x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - dragOffsetX;
            draggingNode.y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - dragOffsetY;
        }

        function handlePointerUp() {
            if (!draggingNode) return;
            for (let n of nodes) {
                if (n !== draggingNode && Math.hypot(n.x - draggingNode.x, n.y - draggingNode.y) < n.radius + draggingNode.radius) {
                    const res = getEmotionData(draggingNode.vector, n.vector, draggingNode.name, n.name);
                    for (let i=0; i<15; i++) particles.push(new Particle(n.x, n.y, n.color));
                    nodes = nodes.filter(node => node !== n && node !== draggingNode);
                    nodes.push(new Node(n.x, n.y, res.name, res.vector));
                    if (!discoveredNames.has(res.name)) { discoveredNames.add(res.name); updateSidebar(); }
                    break;
                }
            }
            draggingNode = null;
        }

        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);
        canvas.addEventListener('touchstart', handlePointerDown);
        window.addEventListener('touchmove', handlePointerMove);
        window.addEventListener('touchend', handlePointerUp);

        function updateSidebar() {
            emotionList.innerHTML = "";
            [...discoveredNames].sort().forEach(name => {
                const btn = document.createElement('div');
                btn.className = 'emotion-btn'; btn.textContent = name;
                const data = knownEmotions.find(e => e.name === name);
                btn.style.borderBottom = `3px solid ${getVectorColor(data.vector)}`;
                btn.onclick = () => nodes.push(new Node(canvas.width/2, canvas.height/2, name, data.vector));
                emotionList.appendChild(btn);
            });
            document.getElementById('counter').textContent = `Discovered: ${discoveredNames.size}`;
        }

        function loop() {
            ctx.fillStyle = "rgba(15, 23, 42, 0.3)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => p.draw());
            nodes.forEach(n => { n.update(); n.draw(); });
            requestAnimationFrame(loop);
        }

        // Init
        seedEmotions.slice(0, 8).forEach((e, i) => nodes.push(new Node(100 + i*60, 100 + i*40, e.name, e.vector)));
        updateSidebar();
        loop();

    </script>
</body>
</html>
