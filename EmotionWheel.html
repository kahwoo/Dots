// ---------------- LABEL ----------------
function drawLabel(cx, cy, innerR, outerR, startAngle, endAngle, label){
  const angle = (startAngle+endAngle)/2;
  const arcLength = (endAngle-startAngle)*outerR*scale;
  const maxFont = 18, minFont = 4; // small minimum font
  let fontSize = Math.min(maxFont, arcLength/(label.length*0.6));
  fontSize = Math.max(fontSize, minFont); // always draw
  ctx.save();
  const r = (innerR + outerR)/2*scale;
  ctx.translate(cx + r*Math.cos(angle), cy + r*Math.sin(angle));
  ctx.rotate(angle);
  if(angle>Math.PI/2 && angle<3*Math.PI/2) ctx.rotate(Math.PI);
  ctx.font = `${fontSize}px sans-serif`;
  ctx.fillStyle = "#fff";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  let text = label;
  const maxWidth = arcLength - 2;
  while(ctx.measureText(text).width > maxWidth && text.length>3) text = text.slice(0,-1);
  if(text !== label) text += "…";
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

// ---------------- SEGMENT ----------------
function drawSegment(cx, cy, innerR, outerR, startAngle, endAngle, color, label){
  ctx.beginPath();
  ctx.moveTo(cx + innerR*Math.cos(startAngle)*scale, cy + innerR*Math.sin(startAngle)*scale);
  ctx.arc(cx, cy, outerR*scale, startAngle, endAngle);
  ctx.lineTo(cx + innerR*Math.cos(endAngle)*scale, cy + innerR*Math.sin(endAngle)*scale);
  ctx.arc(cx, cy, innerR*scale, endAngle, startAngle, true);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  drawLabel(cx, cy, innerR, outerR, startAngle, endAngle, label);
}

// ---------------- RECURSIVE DRAW ----------------
function drawNode(node, depth, startAngle, endAngle, parentColor){
  const cx = width/2 + offsetX;
  const cy = height/2 + offsetY;
  const innerR = depth*ringWidth;
  const outerR = innerR + ringWidth-gap;
  const color = node.color || parentColor;
  if(depth>0) drawSegment(cx, cy, innerR, outerR, startAngle, endAngle, color, node.name);
  if(!node.children) return;
  let angle = startAngle;
  const slice = (endAngle-startAngle)/node.children.length;
  node.children.forEach(child=>{
    drawNode(child, depth+1, angle, angle+slice, color);
    angle += slice;
  });
}

// ---------------- MAIN LOOP ----------------
function draw(){
  ctx.clearRect(0,0,width,height);
  drawNode(data, 0, -Math.PI/2, Math.PI*1.5, null);
  requestAnimationFrame(draw);
}
draw();

// ---------------- SCROLL ZOOM (cursor-centered) ----------------
canvas.addEventListener("wheel", e=>{
  e.preventDefault();
  const zoomFactor = 1.1;
  const mouseX = e.clientX - width/2 - offsetX;
  const mouseY = e.clientY - height/2 - offsetY;
  const oldScale = scale;
  if(e.deltaY<0) scale *= zoomFactor;
  else scale /= zoomFactor;
  scale = Math.min(Math.max(scale, 0.2), 20); // allow deep zoom
  offsetX -= mouseX*(scale/oldScale -1);
  offsetY -= mouseY*(scale/oldScale -1);
});

// ---------------- PINCH ZOOM (centered) ----------------
canvas.addEventListener("touchmove", e=>{
  if(e.touches.length==2){
    e.preventDefault();
    const x0 = e.touches[0].clientX, y0 = e.touches[0].clientY;
    const x1 = e.touches[1].clientX, y1 = e.touches[1].clientY;
    const midX = (x0+x1)/2 - width/2 - offsetX;
    const midY = (y0+y1)/2 - height/2 - offsetY;
    const dx = x0-x1, dy = y0-y1;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(lastTouchDist != null){
      const factor = dist/lastTouchDist;
      const oldScale = scale;
      scale *= factor;
      scale = Math.min(Math.max(scale,0.2),20);
      offsetX -= midX*(scale/oldScale -1);
      offsetY -= midY*(scale/oldScale -1);
    }
    lastTouchDist = dist;
  }
});
canvas.addEventListener("touchend", e=>{ if(e.touches.length<2) lastTouchDist=null; });

// ---------------- PAN ----------------
let isDragging = false, dragStart={x:0,y:0};
canvas.addEventListener("mousedown", e=>{ isDragging=true; dragStart={x:e.clientX, y:e.clientY}; });
canvas.addEventListener("mousemove", e=>{
  if(isDragging){
    offsetX += e.clientX - dragStart.x;
    offsetY += e.clientY - dragStart.y;
    dragStart={x:e.clientX, y:e.clientY};
  }
});
canvas.addEventListener("mouseup", e=>{ isDragging=false; });
canvas.addEventListener("mouseleave", e=>{ isDragging=false; });

// ---------------- TOUCH PAN ----------------
let lastTouchPos = null;
canvas.addEventListener("touchstart", e=>{
  if(e.touches.length==1) lastTouchPos={x:e.touches[0].clientX, y:e.touches[0].clientY};
});
canvas.addEventListener("touchmove", e=>{
  if(e.touches.length==1 && lastTouchPos){
    offsetX += e.touches[0].clientX - lastTouchPos.x;
    offsetY += e.touches[0].clientY - lastTouchPos.y;
    lastTouchPos={x:e.touches[0].clientX, y:e.touches[0].clientY};
  }
});
canvas.addEventListener("touchend", e=>{ lastTouchPos=null; });
