<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chroma Psyche: Calm Drift</title>
<style>
:root {
    --bg: #020617; --sidebar-bg: #0f172a; --text: #f8fafc;
    --accent: #38bdf8; --border: #1e293b; --hover: #334155;
}
body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text);
    display: flex; overflow: hidden; touch-action: none;
}
#game-container { flex: 1; position: relative; cursor: crosshair; }
canvas { display: block; width: 100%; height: 100%; }
#sidebar {
    width: 320px; background-color: var(--sidebar-bg);
    border-left: 2px solid var(--border); display: flex; flex-direction: column; z-index: 10;
}
#sidebar-header { padding: 20px; border-bottom: 2px solid var(--border); background: rgba(0,0,0,0.3); }
#sidebar-header h1 { margin: 0; font-size: 14px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; text-align: center; }
#sidebar-header p { font-size: 10px; color: #64748b; text-align: center; margin: 8px 0 0 0; }
#emotion-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }
.emo-tag {
    background: var(--border); padding: 5px 10px; border-radius: 4px;
    cursor: pointer; font-size: 10px; font-weight: 800; transition: 0.2s;
    border-bottom: 2px solid rgba(0,0,0,0.2); white-space: nowrap; text-transform: uppercase;
    display: flex; align-items: center; gap: 4px;
}
.emo-tag.complete { opacity: 0.4; border-bottom: none; filter: saturate(0.5); }
.tick { color: #10b981; font-weight: bold; }
.emo-tag:hover { background: var(--hover); transform: scale(1.05); }
.controls { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
button { flex: 1; background: #1e293b; border: 1px solid var(--border); color: #94a3b8; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 9px; font-weight: bold; }
@media (max-width: 768px) { body { flex-direction: column; } #sidebar { width: 100%; height: 40%; } }
</style>
</head>
<body>
<div id="game-container"><canvas id="canvas"></canvas></div>
<div id="sidebar">
    <div id="sidebar-header">
        <h1>Chroma Psyche</h1>
        <p id="stat-count">RECONSTRUCTING MIND...</p>
    </div>
    <div id="emotion-list"></div>
    <div class="controls">
        <button onclick="nodes = []">Clear Canvas</button>
        <button onclick="resetLib()" style="color:#f87171">Reset Progress</button>
    </div>
</div>

let nodes = [];
let particles = [];
let discovered = new Set(["Joy", "Sadness", "Anger", "Fear", "Trust", "Anticipation", "Peace", "Disgust", "Surprise"]);
let draggingNode = null;
let offset = { x: 0, y: 0 };

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const listUI = document.getElementById('emotion-list');

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 1.0;
    }
draw() {
    // 1. IMMEDIATE EXIT: If name is missing or undefined, stop everything.
    if (!this || !this.name) return; 

    ctx.save();
    
    // 2. CHECK MERGE GLOW (with extra safety)
    let canMerge = false;
    if (draggingNode && draggingNode.name && draggingNode !== this) {
        const combo = [draggingNode.name, this.name].sort();
        const key = `${combo[0]}+${combo[1]}`;
        if (RECIPES[key]) canMerge = true;
    }

    if (canMerge) {
        ctx.shadowColor = "white";
        ctx.shadowBlur = 35; 
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
        ctx.stroke();
    } else {
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
    }

    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // 3. SAFE TEXT RENDERING
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 9px Inter, sans-serif";
    
    // Final safety check before calling the string method
    const label = String(this.name || "").toUpperCase();
    ctx.fillText(label, this.x, this.y + 3);
    
    ctx.restore();
}
}

function createBurst(x, y, color) {
    for (let i = 0; i < 30; i++) particles.push(new Particle(x, y, color));
}

function isComplete(name) {
    for (const [recipe, result] of Object.entries(RECIPES)) {
        if (recipe.split('+').includes(name)) {
            const resArray = Array.isArray(result) ? result : [result];
            if (resArray.some(r => !discovered.has(r))) return false;
        }
    }
    return true;
}

function updateSidebar() {
    listUI.innerHTML = "";
    Array.from(discovered).sort().forEach(name => {
        const div = document.createElement('div');
        const done = isComplete(name);
        const color = emotionLib[name] || "#94a3b8";
        div.className = `emo-tag ${done ? 'complete' : ''}`;
        div.style.backgroundColor = color;
        div.style.color = (parseInt(color.replace('#',''),16) > 0xffffff/2) ? 'black':'white';
        div.innerHTML = `<span>${name}</span>${done ? '<span class="tick">✔</span>':''}`;
        div.onclick = () => spawn(name);
        listUI.appendChild(div);
    });
    document.getElementById('stat-count').innerText = `${discovered.size} PATHS MAPPED`;
}

class Node {
    constructor(x, y, name, radius = 42) {
        this.x = x; this.y = y; this.name = name;
        this.color = emotionLib[name] || "#94a3b8";
        this.radius = radius; this.vx = 0; this.vy = 0;
    }
    update() {
        if (this === draggingNode) return;
        
        // Soft pull to center
        const dx = canvas.width/2 - this.x;
        const dy = canvas.height/2 - this.y;
        const dist = Math.hypot(dx, dy);
        if(dist>120){this.vx+=dx*0.00001; this.vy+=dy*0.00001;}

        // High friction for self-organizing feel
        this.vx *= 0.85; this.vy *= 0.85;
        this.x += this.vx; this.y += this.vy;

        // Boundaries
        if(this.x<this.radius){this.x=this.radius; this.vx*=-0.3;}
        if(this.x>canvas.width-this.radius){this.x=canvas.width-this.radius; this.vx*=-0.3;}
        if(this.y<this.radius){this.y=this.radius; this.vy*=-0.3;}
        if(this.y>canvas.height-this.radius){this.y=canvas.height-this.radius; this.vy*=-0.3;}
    }
draw() {
    ctx.save();
    
    // Check if this node can merge with the one we are currently holding
    let canMerge = false;
    if (draggingNode && draggingNode !== this) {
        const combo = [draggingNode.name, this.name].sort();
        const key = `${combo[0]}+${combo[1]}`;
        if (RECIPES[key]) {
            canMerge = true;
        }
    }

    // Apply the glow effect
    if (canMerge) {
        ctx.shadowColor = "white"; // Bright white highlight
        ctx.shadowBlur = 30;       // Extra large glow
        ctx.strokeStyle = "white"; // White ring
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 2, 0, Math.PI * 2);
        ctx.stroke();
    } else {
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
    }

    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // Text label
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 9px Inter, sans-serif";
    ctx.fillText(this.name.toUpperCase(), this.x, this.y + 3);
    
    ctx.restore();
}
}

function blendColor(c1, c2){
    const f1=parseInt(c1.slice(1),16), f2=parseInt(c2.slice(1),16);
    const r=Math.round(((f1>>16)+(f2>>16))/2);
    const g=Math.round((((f1>>8)&0xff)+((f2>>8)&0xff))/2);
    const b=Math.round(((f1&0xff)+(f2&0xff))/2);
    return `#${((1<<24)+r*65536+g*256+b).toString(16).slice(1)}`;
}

function spawn(name, x, y, r=42, parentColors){
    let color = emotionLib[name] || (parentColors ? blendColor(parentColors[0], parentColors[1]) : "#94a3b8");
    emotionLib[name] = color;

    let spawnX = x || canvas.width/2;
    let spawnY = y || canvas.height/2;

    // Sidebar/Center Anti-Stacking
    let attempts = 0;
    while(nodes.some(n => Math.hypot(spawnX-n.x, spawnY-n.y) < (r + n.radius)) && attempts < 15) {
        spawnX += (Math.random()-0.5) * 50;
        spawnY += (Math.random()-0.5) * 50;
        attempts++;
    }

    const newNode = new Node(spawnX, spawnY, name, r);
    newNode.vx = (Math.random()-0.5)*3;
    newNode.vy = (Math.random()-0.5)*3;
    nodes.push(newNode);
}

function handlePointerDown(e){
    const rect=canvas.getBoundingClientRect();
    const x=(e.clientX||(e.touches?e.touches[0].clientX:0))-rect.left;
    const y=(e.clientY||(e.touches?e.touches[0].clientY:0))-rect.top;
    for(let i=nodes.length-1;i>=0;i--){
        if(Math.hypot(x-nodes[i].x,y-nodes[i].y)<nodes[i].radius){
            draggingNode=nodes[i];
            offset.x=x-draggingNode.x; offset.y=y-draggingNode.y;
            draggingNode.vx=0; draggingNode.vy=0;
            return;
        }
    }
}

function handlePointerMove(e){
    if(!draggingNode) return;
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX||(e.touches?e.touches[0].clientX:0))-r.left;
    const y=(e.clientY||(e.touches?e.touches[0].clientY:0))-r.top;
    draggingNode.x=x-offset.x; draggingNode.y=y-offset.y;
}

function handlePointerUp(){
    if(!draggingNode) return;
    const mx = draggingNode.x;
    const my = draggingNode.y;

    for (let i = nodes.length - 1; i >= 0; i--) {
        let other = nodes[i];
        if (other === draggingNode) continue;

        if (Math.hypot(mx - other.x, my - other.y) < (draggingNode.radius + other.radius)) {
            const combo = [draggingNode.name, other.name].sort();
            const key = `${combo[0]}+${combo[1]}`;
            const result = RECIPES[key];

            if (result) {
                const parentColors = [draggingNode.color, other.color];
                nodes.splice(i, 1);
                nodes.splice(nodes.indexOf(draggingNode), 1);

                const resultsArray = Array.isArray(result) ? result : [result];
                resultsArray.forEach((res, index) => {
                    const offsetX = (index * 30) - ((resultsArray.length - 1) * 15);
                    spawn(res, mx + offsetX, my, 48, parentColors);
                    if (!discovered.has(res)) {
                        discovered.add(res);
                        createBurst(mx + offsetX, my, emotionLib[res]);
                    }
                });

                updateSidebar();
                localStorage.setItem('psyche_v8_calm', JSON.stringify(Array.from(discovered)));
                draggingNode = null; 
                return;
            }
        }
    }
    draggingNode = null;
}

function loop() {
    ctx.fillStyle = "rgba(2,6,23,0.4)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Filter and draw particles
    particles = particles.filter(p => p && p.life > 0);
    particles.forEach(p => p.draw());

    // Repulsion Logic (unchanged, but added safety check)
    for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
            let n1 = nodes[i], n2 = nodes[j];
            if (!n1 || !n2 || !n1.name || !n2.name) continue; // Safety check
            if (n1 === draggingNode || n2 === draggingNode) continue;

            let dx = n2.x - n1.x, dy = n2.y - n1.y;
            let dist = Math.hypot(dx, dy);
            let min = n1.radius + n2.radius + 10;
            
            if (dist < min && dist > 0) {
                let force = (min - dist) * 0.04;
                let nx = dx / dist, ny = dy / dist;
                n1.vx -= nx * force; n1.vy -= ny * force;
                n2.vx += nx * force; n2.vy += ny * force;
            }
        }
    }

    // DRAWING LOOP: Iterate backwards to handle potential splices safely
    for (let i = nodes.length - 1; i >= 0; i--) {
        const n = nodes[i];
        if (n && n.name) {
            n.update();
            n.draw();
        }
    }

    requestAnimationFrame(loop);
}

canvas.addEventListener('mousedown',handlePointerDown);
window.addEventListener('mousemove',handlePointerMove);
window.addEventListener('mouseup',handlePointerUp);
canvas.addEventListener('touchstart',e=>{e.preventDefault();handlePointerDown(e);},{passive:false});
window.addEventListener('touchmove',e=>{e.preventDefault();handlePointerMove(e);},{passive:false});
window.addEventListener('touchend',handlePointerUp);
window.addEventListener('resize',()=>{canvas.width=canvas.parentElement.clientWidth; canvas.height=canvas.parentElement.clientHeight;});

canvas.width=canvas.parentElement.clientWidth;
canvas.height=canvas.parentElement.clientHeight;
const data=localStorage.getItem('psyche_v8_calm'); if(data) discovered=new Set(JSON.parse(data));
updateSidebar(); loop();

function resetLib(){if(confirm("Reset progress?")){localStorage.clear();location.reload();}}
</script>
